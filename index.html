<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat — Firebase</title>
    <style>
        :root {
            --primary-color: #007bff;
            --bg-color: #f0f2f5;
            --text-gray: #65676b;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .app-container { width: 450px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; height: 90vh; }

        /* Header */
        .header { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; background: #7cb342; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .logout-btn { color: red; font-size: 12px; cursor: pointer; text-decoration: none; border: none; background: none; }

        /* Contact List */
        .contacts-section { padding: 15px; border-bottom: 1px solid #eee; }
        .contacts-section h4 { margin: 0 0 10px 0; font-size: 14px; color: var(--text-gray); }
        .contact-item { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 8px; border-radius: 10px; transition: 0.2s; }
        .contact-item:hover { background: #f0f2f5; }
        .contact-item.active { background: #e7f3ff; }
        .contact-avatar { width: 35px; height: 35px; background: #00acc1; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; }

        /* Chat Window */
        .chat-header { padding: 10px 20px; font-weight: bold; font-size: 14px; border-bottom: 1px solid #eee; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #f9f9f9; }
        
        .message { max-width: 70%; padding: 8px 15px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
        .message.incoming { align-self: flex-start; background: #e4e6eb; color: black; }
        .message.outgoing { align-self: flex-end; background: var(--primary-color); color: white; }

        /* Input Area */
        .input-area { padding: 15px; display: flex; gap: 10px; align-items: center; }
        input#messageInput { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        .send-btn { background: var(--primary-color); border: none; width: 35px; height: 35px; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="user-info">
            <div class="avatar" id="myAvatar">?</div>
            <div>
                <div style="font-size: 14px; font-weight: bold;" id="myName">Загрузка...</div>
                <button class="logout-btn" onclick="location.reload()">Выйти</button>
            </div>
        </div>
    </div>

    <div class="contacts-section">
        <h4>Выберите собеседника:</h4>
        <div id="contactsList"></div>
    </div>

    <div class="chat-header" id="chatWithTitle">Выберите, кому написать</div>
    <div id="chat-messages">
        </div>

    <form class="input-area" id="messageForm">
        <input type="text" id="messageInput" placeholder="Ваше сообщение..." autocomplete="off">
        <button type="submit" class="send-btn">➤</button>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, where, serverTimestamp, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    // Твой конфиг
    const firebaseConfig = {
        apiKey: "AIzaSyBklzkgHC13b_fdvXLyNxGiB1uqRe8u3yg",
        authDomain: "test-7fd36.firebaseapp.com",
        projectId: "test-7fd36",
        storageBucket: "test-7fd36.firebasestorage.app",
        messagingSenderId: "690593221740",
        appId: "1:690593221740:web:c796b5718efec5b105dc49"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUser = null;
    let selectedUserId = null;
    let unsubscribeMessages = null;

    // 1. Авторизация
    signInAnonymously(auth);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            // Для теста спрашиваем имя, если его нет в памяти
            let userName = localStorage.getItem('chat_user_name');
            if (!userName) {
                userName = prompt("Введите ваше имя для чата:") || "Аноним";
                localStorage.setItem('chat_user_name', userName);
            }

            currentUser = { id: user.uid, name: userName };
            document.getElementById('myName').innerText = userName;
            document.getElementById('myAvatar').innerText = userName[0].toUpperCase();

            // Сохраняем пользователя в БД
            await setDoc(doc(db, "users", user.uid), {
                name: userName,
                lastSeen: serverTimestamp()
            }, { merge: true });

            loadContacts();
        }
    });

    // 2. Загрузка списка пользователей
    function loadContacts() {
        onSnapshot(collection(db, "users"), (snapshot) => {
            const list = document.getElementById('contactsList');
            list.innerHTML = "";
            snapshot.forEach(docSnap => {
                const user = docSnap.data();
                if (docSnap.id === currentUser.id) return; // Не показываем себя

                const div = document.createElement('div');
                div.className = `contact-item ${selectedUserId === docSnap.id ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="contact-avatar">${user.name[0]}</div>
                    <div class="contact-name">${user.name}</div>
                `;
                div.onclick = () => selectContact(docSnap.id, user.name);
                list.appendChild(div);
            });
        });
    }

    // 3. Выбор собеседника и загрузка сообщений
    function selectContact(userId, userName) {
        selectedUserId = userId;
        document.getElementById('chatWithTitle').innerText = `Чат с: ${userName}`;
        
        // Подсвечиваем активного в списке
        loadContacts(); 

        // Генерируем уникальный ID чата для двоих (всегда одинаковый для этой пары)
        const chatId = [currentUser.id, userId].sort().join('_');

        // Отписываемся от старого чата, если был
        if (unsubscribeMessages) unsubscribeMessages();

        const q = query(
            collection(db, "messages"),
            where("chatId", "==", chatId),
            orderBy("timestamp", "asc")
        );

        unsubscribeMessages = onSnapshot(q, (snapshot) => {
            const container = document.getElementById('chat-messages');
            container.innerHTML = "";
            snapshot.forEach(doc => {
                const msg = doc.data();
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${msg.senderId === currentUser.id ? 'outgoing' : 'incoming'}`;
                msgDiv.innerText = msg.text;
                container.appendChild(msgDiv);
            });
            container.scrollTop = container.scrollHeight;
        });
    }

    // 4. Отправка сообщения
    document.getElementById('messageForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const input = document.getElementById('messageInput');
        const text = input.value.trim();

        if (text && selectedUserId) {
            const chatId = [currentUser.id, selectedUserId].sort().join('_');
            input.value = "";

            await addDoc(collection(db, "messages"), {
                chatId: chatId,
                senderId: currentUser.id,
                text: text,
                timestamp: serverTimestamp()
            });
        } else if (!selectedUserId) {
            alert("Выберите собеседника!");
        }
    });
</script>

</body>
</html>
