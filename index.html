<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой Firebase проект+</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; background-color: #f4f4f9; }
        .form-container { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #4b4b00; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }
        button:hover { background: #dfa00b; }

        #counter { margin-top: 20px; font-size: 0.9em; color: #666; }
    </style>
</head>
<body>

<div class="form-container">
    <h3>Отправить заявку</h3>
    <form id="feedbackForm">
        <input type="text" id="userName" placeholder="Ваше имя" required>
        <input type="email" id="userEmail" placeholder="Ваш Email" required>
        <button type="submit" id="submitBtn">Отправить в облако</button>
    </form>
    <div id="counter">Загрузка счетчика...</div>
</div>

<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBklzkgHC13b_fdvXLyNxGiB1uqRe8u3yg",
        authDomain: "test-7fd36.firebaseapp.com",
        projectId: "test-7fd36",
        storageBucket: "test-7fd36.firebasestorage.app",
        messagingSenderId: "690593221740",
        appId: "1:690593221740:web:c796b5718efec5b105dc49",
        measurementId: "G-H68ETEEG64"
    };


    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    signInAnonymously(auth)
        .then(() => console.log("Вход выполнен анонимно"))
        .catch((error) => console.error("Ошибка входа:", error));


    onSnapshot(collection(db, "requests"), (snapshot) => {
        const count = snapshot.size;
        document.getElementById("counter").innerText = `Всего заявок в базе: ${count}`;
    });


    document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById("submitBtn");
        submitBtn.disabled = true;

        const nameInput = document.getElementById("userName").value;
        const emailInput = document.getElementById("userEmail").value;

        try {
            await addDoc(collection(db, "requests"), {
                name: nameInput,
                email: emailInput,
                timestamp: new Date()
            });
            alert("Готово! Данные сохранены.");
            document.getElementById("feedbackForm").reset();
        } catch (error) {
            console.error("Ошибка записи: ", error);
            alert("Ошибка при отправке. Проверьте правила доступа в консоли Firebase.");
        } finally {
            submitBtn.disabled = false;
        }
    });
</script>
</body>
</html>
