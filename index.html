<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Reactive Firebase System</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .msg-card { border: 1px solid #eee; padding: 15px; margin-bottom: 10px; border-radius: 8px; position: relative; }
        .msg-text { margin-bottom: 10px; display: block; }
        .like-btn { cursor: pointer; border: none; background: #e7f3ff; color: #007bff; padding: 5px 12px; border-radius: 15px; font-weight: bold; }
        .like-btn:hover { background: #d0e7ff; }
        .meta { font-size: 0.8em; color: gray; }
        #login-btn { width: 100%; padding: 15px; background: #4285F4; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .input-group { display: flex; gap: 10px; margin-top: 20px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-section">
        <button id="login-btn">Войти через Google для доступа к системе</button>
    </div>

    <div id="main-app" style="display:none;">
        <h3>Реактивная лента (BaaS Model)</h3>
        <div id="feed"></div>
        
        <form class="input-group" id="postForm">
            <input type="text" id="msgInput" placeholder="Введите сообщение..." required>
            <button type="submit">Отправить</button>
        </form>
        <button onclick="auth.signOut()" style="margin-top:20px; border:none; background:none; color:red; cursor:pointer;">Выйти</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    // ИСПОЛЬЗУЙ СВОЙ КОНФИГ ИЗ ПРЕДЫДУЩИХ ШАГОВ
    const firebaseConfig = {
        apiKey: "AIzaSyBklzkgHC13b_fdvXLyNxGiB1uqRe8u3yg",
        authDomain: "test-7fd36.firebaseapp.com",
        projectId: "test-7fd36",
        storageBucket: "test-7fd36.firebasestorage.app",
        messagingSenderId: "690593221740",
        appId: "1:690593221740:web:c796b5718efec5b105dc49"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.auth = getAuth(app); // Экспортируем для консоли (тест на взлом)
    const provider = new GoogleAuthProvider();

    // 1. Аутентификация
    const loginBtn = document.getElementById('login-btn');
    loginBtn.onclick = () => signInWithPopup(auth, provider);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            initFeed();
        } else {
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('main-app').style.display = 'none';
        }
    });

    // 2. Реактивная загрузка (onSnapshot + orderBy)
    function initFeed() {
        const q = query(collection(db, "messages"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const card = document.createElement('div');
                card.className = 'msg-card';
                card.innerHTML = `
                    <span class="meta">${data.author || 'Аноним'}</span>
                    <span class="msg-text">${data.text}</span>
                    <button class="like-btn" onclick="window.likeMessage('${docSnap.id}')">
                        ❤️ ${data.likes || 0}
                    </button>
                `;
                feed.appendChild(card);
            });
        });
    }

    // 3. Атомарное обновление лайков (updateDoc + increment)
    window.likeMessage = async (id) => {
        const docRef = doc(db, "messages", id);
        try {
            await updateDoc(docRef, {
                likes: increment(1)
            });
        } catch (e) {
            console.error("Ошибка безопасности:", e.message);
        }
    };

    // 4. Отправка данных
    document.getElementById('postForm').onsubmit = async (e) => {
        e.preventDefault();
        const input = document.getElementById('msgInput');
        await addDoc(collection(db, "messages"), {
            text: input.value,
            author: auth.currentUser.displayName,
            likes: 0,
            timestamp: serverTimestamp()
        });
        input.value = "";
    };
</script>
</body>
</html>
